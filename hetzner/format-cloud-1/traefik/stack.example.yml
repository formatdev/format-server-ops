networks:
  proxy:
    external: true

services:
  traefik:
    image: traefik:3.6.13
    networks:
      - proxy
    command:
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.websecure.http3
      - --providers.swarm=true
      - --providers.swarm.watch=true
      - --providers.swarm.network=proxy
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --api=false
      - --api.insecure=false
      - --api.dashboard=false
      - --certificatesresolvers.letsencrypt.acme.dnschallenge=true
      - --certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare
      - --certificatesresolvers.letsencrypt.acme.email=server@esst.lu
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --log.level=ERROR
      - --accesslog=true
      - --accesslog.filepath=/var/log/access.log
      - --accesslog.bufferingsize=500
      - --accessLog.filters.statusCodes=400-599
    ports:
      # Confirm whether port 80 should be published before enabling this in production.
      # - target: 80
      #   published: 80
      #   protocol: tcp
      #   mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: udp
        mode: host
    volumes:
      - /data/traefik/certificates:/letsencrypt
      - /data/traefik/logs:/var/log
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == format-cloud-1
      labels:
        - traefik.enable=true
        - traefik.http.middlewares.gzip.compress=true
        - traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true
        - traefik.http.middlewares.redirect-to-https.redirectscheme.port=443
        - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
        - traefik.http.middlewares.secure-chain.chain.middlewares=redirect-to-https,secure-headers
        - traefik.http.middlewares.secure-headers.headers.browserXssFilter=true
        - traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.secure-headers.headers.customFrameOptionsValue=SAMEORIGIN
        - traefik.http.middlewares.secure-headers.headers.customresponseheaders.Permissions-Policy=interest-cohort=()
        - traefik.http.middlewares.secure-headers.headers.forceSTSHeader=true
        - traefik.http.middlewares.secure-headers.headers.frameDeny=true
        - traefik.http.middlewares.secure-headers.headers.sslProxyHeaders.X-Forwarded-Proto=https
        - traefik.http.middlewares.secure-headers.headers.sslRedirect=true
        - traefik.http.middlewares.secure-headers.headers.sslTemporaryRedirect=true
        - traefik.http.middlewares.secure-headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.secure-headers.headers.stsPreload=true
        - traefik.http.middlewares.secure-headers.headers.stsSeconds=63072000
        - traefik.http.routers.http-catchall.entrypoints=web
        - traefik.http.routers.http-catchall.middlewares=redirect-to-https
        - traefik.http.routers.http-catchall.rule=hostregexp(`{host:.+}`)
        # Dashboard labels are intentionally omitted while --api=false and --api.dashboard=false.
