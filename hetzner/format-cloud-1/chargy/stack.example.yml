networks:
  proxy:
    external: true

services:
  app:
    image: esst/chargy:latest
    networks:
      - proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == format-cloud-1
      labels:
        - traefik.enable=true
        - traefik.http.routers.chargy.rule=Host(`chargy.format.lu`)
        - traefik.http.routers.chargy.entrypoints=websecure
        - traefik.http.routers.chargy.tls=true
        - traefik.http.routers.chargy.tls.certresolver=letsencrypt
        - traefik.http.routers.chargy.middlewares=secure-chain,gzip
        - traefik.http.services.chargy.loadbalancer.server.port=80

  redis:
    image: redis:7.4-alpine3.21
    volumes:
      - redis:/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == format-cloud-1

volumes:
  redis:
