networks:
  proxy:
    external: true

services:
  server:
    image: ghcr.io/dani-garcia/vaultwarden:1.35.7
    networks:
      - proxy
    environment:
      - TZ=Europe/Luxembourg
      - DOMAIN=https://bitwarden.format.lu
      - SIGNUPS_ALLOWED=false
      # Store the real admin password in Bitwarden.
      # Store only the generated Argon2 hash here, with each "$" escaped as "$$".
      - ADMIN_TOKEN=$$argon2id$$v=19$$m=65540,t=3,p=4$$REPLACE_WITH_ESCAPED_HASH
    volumes:
      - /data/files/vaultwarden/data:/data
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == format-cloud-1
      labels:
        - traefik.enable=true
        - traefik.http.routers.vaultwarden.rule=Host(`bitwarden.format.lu`)
        - traefik.http.routers.vaultwarden.entrypoints=websecure
        - traefik.http.routers.vaultwarden.tls=true
        - traefik.http.routers.vaultwarden.tls.certresolver=letsencrypt
        - traefik.http.routers.vaultwarden.middlewares=secure-chain,gzip
        - traefik.http.services.vaultwarden.loadbalancer.server.port=80
