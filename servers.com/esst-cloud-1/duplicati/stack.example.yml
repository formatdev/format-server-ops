networks:
  proxy:
    external: true

services:
  duplicati_ec1:
    image: duplicati/duplicati:latest
    networks:
      - proxy
    environment:
      - DUPLICATI__DISABLE_DB_ENCRYPTION=false
      - SETTINGS_ENCRYPTION_KEY=REPLACE_WITH_SECRET
    volumes:
      - duplicati_ec1_data:/data
      - /data:/source-data:ro
      - /opt/esst:/source-opt-esst:ro
      - /etc:/source-etc:ro
      - /var/lib/docker/volumes/n8n_data/_data:/source-volumes/n8n_data:ro
      - /var/lib/docker/volumes/esst-website_wordpress/_data:/source-volumes/esst-website_wordpress:ro
      - /root/.ssh/duplicati_synology_backup_ed25519:/sshkeys/synology_backup_ed25519:ro
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == esst-cloud-1
      labels:
        - traefik.enable=true
        - traefik.http.routers.duplicati-ec1.rule=Host(`duplicati-ec1.esst.lu`)
        - traefik.http.routers.duplicati-ec1.entrypoints=websecure
        - traefik.http.routers.duplicati-ec1.tls=true
        - traefik.http.routers.duplicati-ec1.tls.certresolver=letsencrypt
        - traefik.http.routers.duplicati-ec1.middlewares=secure-chain,gzip
        - traefik.http.services.duplicati-ec1.loadbalancer.server.port=8200

volumes:
  duplicati_ec1_data:
