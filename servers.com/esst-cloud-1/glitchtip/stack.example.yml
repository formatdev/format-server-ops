x-environment:
  default-environment: &default-environment
    DATABASE_URL: ${GLITCHTIP_DATABASE_URL:?set GLITCHTIP_DATABASE_URL}
    REDIS_HOST: esst-glitchtip_redis
    SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?set GLITCHTIP_SECRET_KEY}
    PORT: "8000"
    EMAIL_URL: ${GLITCHTIP_EMAIL_URL:?set GLITCHTIP_EMAIL_URL}
    GLITCHTIP_DOMAIN: https://glitchtip.esst.lu
    DEFAULT_FROM_EMAIL: glitchtip@vo.lu
    ALLOWED_HOSTS: glitchtip.esst.lu
    CSRF_TRUSTED_ORIGINS: https://glitchtip.esst.lu
    ENABLE_USER_REGISTRATION: "false"
    CELERY_WORKER_AUTOSCALE: "1,3"
    CELERY_WORKER_MAX_TASKS_PER_CHILD: "10000"

x-deploy-defaults:
  app-deploy: &app-deploy
    resources:
      limits:
        cpus: "1"
        memory: 1G
    replicas: 1
    restart_policy:
      condition: on-failure
    placement:
      constraints:
        - node.hostname == esst-cloud-1

networks:
  proxy:
    external: true
  internal:
    internal: true

services:
  web:
    image: glitchtip/glitchtip:v5.2.1
    volumes:
      - /data/files/esst/glitchtip/uploads:/code/uploads
    networks:
      - proxy
      - internal
    environment: *default-environment
    deploy:
      <<: *app-deploy
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.glitchtip.rule=Host(`glitchtip.esst.lu`)"
        - "traefik.http.routers.glitchtip.entrypoints=websecure"
        - "traefik.http.routers.glitchtip.tls=true"
        - "traefik.http.routers.glitchtip.tls.certresolver=letsencrypt"
        - "traefik.http.routers.glitchtip.middlewares=secure-chain,gzip"
        - "traefik.http.services.glitchtip.loadbalancer.server.port=8000"

  worker:
    image: glitchtip/glitchtip:v5.2.1
    command: ["./bin/run-celery-with-beat.sh"]
    volumes:
      - /data/files/esst/glitchtip/uploads:/code/uploads
    networks:
      - internal
    environment: *default-environment
    deploy:
      <<: *app-deploy
      update_config:
        parallelism: 1
        order: stop-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      labels:
        - "traefik.enable=false"

  migrate:
    image: glitchtip/glitchtip:v5.2.1
    command:
      - /bin/sh
      - -lc
      - ./manage.py migrate && ./manage.py pgpartition --yes
    volumes:
      - /data/files/esst/glitchtip/uploads:/code/uploads
    networks:
      - internal
    environment: *default-environment
    deploy:
      <<: *app-deploy
      restart_policy:
        condition: on-failure

  redis:
    image: bitnami/redis:6.2
    networks:
      - internal
    environment:
      ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - /data/redis/esst/glitchtip:/bitnami/redis/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == esst-cloud-1

  postgres:
    image: postgres:16
    networks:
      - internal
    environment:
      POSTGRES_PASSWORD: ${GLITCHTIP_POSTGRES_PASSWORD:?set GLITCHTIP_POSTGRES_PASSWORD}
      POSTGRES_USER: glitchtip
      POSTGRES_DB: postgres
    volumes:
      - /data/database/esst/glitchtip:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.hostname == esst-cloud-1
